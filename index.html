<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍮 폼폼푸린과 함께하는 일본 여행 🐾</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-page: #FFF5D1;
            --bg-card: #FFFFFF;
            --bg-list: #FFFFFF;
            --hover-list: #FFF9E6;
            --text-main: #5C3A21;
            --text-sub: #402d1c;
            --border-color: #FFA6C9;

            --day1-color: #FFA6C9;
            --day2-color: #98DDCA;
            --day3-color: #8EB8E5;
            --day4-color: #CBAACB;
            --purin-yellow: #FDE162;
            --purin-brown: #5C3A21;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg-page);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-section {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        .header-purin-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--purin-brown);
            margin-bottom: 10px;
            background-color: white;
            box-shadow: 0 4px 10px rgba(92, 58, 33, 0.2);
        }

        .header-section h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--purin-brown);
        }

        .header-section p {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        .top-filters {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border-radius: 30px;
            border: 2px solid transparent;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            color: var(--text-main);
            background: #FFFFFF;
            box-shadow: 0 4px 10px rgba(92, 58, 33, 0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(92, 58, 33, 0.12);
        }

        .filter-btn::before {
            content: '●';
            font-size: 12px;
        }

        #btn-all::before {
            color: var(--purin-brown);
        }

        #btn-all.active {
            background: var(--purin-yellow);
            border-color: var(--purin-brown);
            color: var(--purin-brown);
        }

        #btn-day1::before {
            color: var(--day1-color);
            text-shadow: 0 0 1px #000;
        }

        #btn-day1.active {
            background: var(--day1-color);
            color: var(--purin-brown);
            border-color: var(--purin-brown);
        }

        #btn-day2::before {
            color: var(--day2-color);
        }

        #btn-day2.active {
            background: var(--day2-color);
            color: #fff;
            border-color: var(--purin-brown);
        }

        #btn-day3::before {
            color: var(--day3-color);
        }

        #btn-day3.active {
            background: var(--day3-color);
            color: #fff;
            border-color: var(--purin-brown);
        }

        #btn-day4::before {
            color: var(--day4-color);
        }

        #btn-day4.active {
            background: var(--day4-color);
            color: #fff;
            border-color: var(--purin-brown);
        }

        :root {
            --extra-color: #FFA07A; /* 귤색 핑크 */
        }
        #btn-extra::before { color: var(--extra-color); text-shadow: 0 0 1px #000; }
        #btn-extra.active { background: var(--extra-color); color: var(--purin-brown); border-color: var(--purin-brown); }

        .app-wrapper {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            display: flex;
            background: var(--bg-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 16px 40px rgba(92, 58, 33, 0.15);
            border: 4px solid var(--purin-brown);
            position: relative;
        }

        #map-container {
            flex: 1.4;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        #list-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-list);
            border-left: 1px solid var(--purin-brown);
            position: relative;
        }

        .floating-purin {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px;
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0px 5px 5px rgba(92, 58, 33, 0.2));
        }

        .list-header {
            padding: 22px;
            border-bottom: 2px solid var(--purin-brown);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 16px;
            color: var(--purin-brown);
        }

        .places-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            margin: 0;
            list-style: none;
            padding-bottom: 120px;

        }

        .places-list::-webkit-scrollbar {
            width: 8px;
        }

        .places-list::-webkit-scrollbar-thumb {
            background-color: var(--border-color);
            border-radius: 10px;
            border: 1px solid var(--purin-brown);
        }

        .place-item {
            display: flex;
            align-items: center;
            padding: 18px 22px;
            border-bottom: 1px dashed var(--purin-yellow);
            cursor: pointer;
            transition: background 0.2s;
            gap: 15px;
        }

        .place-item:hover {
            background: var(--hover-list);
        }

        .marker-icon {
            min-width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
            color: var(--purin-brown);
            border: 2px solid var(--purin-brown);
            box-shadow: 0 3px 0 var(--purin-brown);
        }

        .place-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .place-name {
            font-weight: 800;
            font-size: 15px;
            color: var(--text-main);
        }

        .place-desc {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 600;
        }

        .gmap-link {
            font-size: 11px;
            color: var(--purin-brown);
            text-decoration: none;
            font-weight: 800;
            padding: 6px 10px;
            border-radius: 12px;
            background: var(--purin-yellow);
            border: 2px solid var(--purin-brown);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .gmap-link:hover {
            background: #FCE883;
            transform: scale(1.05);
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-card);
            color: var(--text-main);
            border-radius: 16px;
            border: 2px solid var(--purin-brown);
            box-shadow: 0 4px 15px rgba(92, 58, 33, 0.2);
        }

        .leaflet-popup-tip {
            background: var(--bg-card);
        }

        .leaflet-popup-content {
            font-family: 'Pretendard', sans-serif;
            margin: 14px;
            font-size: 14px;
            text-align: center;
        }

        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .header-section,
        .app-wrapper {
            position: relative;
            z-index: 10;
        }

        .petal {
            position: absolute;
            opacity: 0.65;
            filter: brightness(1.1);
            pointer-events: none;
            user-select: none;
        }

        .search-result-item {
            padding: 10px 14px;
            border-bottom: 1px dashed var(--purin-yellow);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: background 0.2s;
            text-align: left;
            line-height: 1.4;
        }
        .search-result-item:hover { background: #FFF9E6; }
        .search-result-item:last-child { border-bottom: none; }

        @keyframes fall {
            0% {
                top: -10vh;
            }

            100% {
                top: 110vh;
            }
        }

        @keyframes sway {
            0% {
                transform: translateX(0px) rotate(0deg);
            }

            50% {
                transform: translateX(40px) rotate(180deg);
            }

            100% {
                transform: translateX(-20px) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            body { padding: 15px 10px; }
            .app-wrapper { flex-direction: column; height: 85vh; border-radius: 20px; }
            #map-container { flex: none; height: 45%; width: 100%; border-left: none; border-bottom: 4px solid var(--purin-brown); }
            #list-panel { flex: none; height: 55%; width: 100%; border-left: none; }
            .floating-purin { width: 80px; }

            .top-filters {
                flex-wrap: nowrap;
                overflow-x: auto;
                justify-content: flex-start;
                padding-bottom: 10px;
                padding-left: 5px;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            
            .top-filters::-webkit-scrollbar {
                display: none;
            }
            
            .filter-btn {
                flex-shrink: 0; 
                padding: 8px 15px; 
                font-size: 13px;
            }

            .filter-btn:last-child {
                margin-right: 20px; 
            }
        }
    </style>
</head>

<body>

    <div id="sakura-container"></div>
    <div class="header-section">

        <img src="https://stickershop.line-scdn.net/stickershop/v1/product/7067/LINEStorePC/main.png?v=1" alt="푸린이"
            class="header-purin-img" onerror="this.style.display='none'">

        <h1>🍮 Japan 여행 야호 🐾</h1>
        <p>오사카 - 교토 - 고베 - 난바 폼폼푸린과 레츠 꼬 💛</p>

        <div
            style="display: inline-flex; align-items: center; justify-content: center; background-color: var(--purin-yellow); color: var(--purin-brown); padding: 5px 18px; border-radius: 20px; font-size: 13px; font-weight: 800; border: 2px dashed var(--purin-brown); margin-bottom: 20px;">
            Plan & Design by 서뎡 🐾
        </div>

        <div class="top-filters" id="top-filters">
            <button class="filter-btn active" id="btn-all" onclick="filterDay('all')">전체 일정</button>
            <button class="filter-btn" id="btn-day1" onclick="filterDay(0)">DAY 1</button>
            <button class="filter-btn" id="btn-day2" onclick="filterDay(1)">DAY 2</button>
            <button class="filter-btn" id="btn-day3" onclick="filterDay(2)">DAY 3</button>
            <button class="filter-btn" id="btn-day4" onclick="filterDay(3)">DAY 4</button>
            <button class="filter-btn" id="btn-extra" onclick="filterDay(4)">🌟 후보지</button>
        </div>
    </div>

    <div class="app-wrapper">
        <div id="map-container">
            <img src="https://item.kakaocdn.net/do/da113e63d8d76d0e0e72adfb8b6d03bd8f324a0b9c48f77dbce3a43bd11ce785"
                alt="둥둥 푸린" class="floating-purin" onerror="this.style.display='none'">
            <div id="map"></div>
        </div>

        <div id="list-panel">

            <div class="list-header">
                <span>📍 장소 목록</span>
                <span id="place-count" style="color: var(--text-sub); font-size: 13px; font-weight: 700;">총 0곳</span>
            </div>

            <div id="add-place-form" style="display: none; padding: 15px 22px; background: #FFF9E6; border-bottom: 2px dashed var(--purin-brown); position: relative;">
            <div style="font-size: 13px; font-weight: 800; color: var(--purin-brown); margin-bottom: 8px;">🌟 장소 검색해서 찜하기</div>
            
            <div style="position: relative;">
                <input type="text" id="place-search" placeholder="장소 검색 (검색 후 목록에서 선택!)" style="width: 100%; box-sizing: border-box; padding: 10px 12px; border: 2px solid var(--purin-brown); border-radius: 8px; font-family: 'Pretendard'; font-size: 14px; outline: none;">
                <ul id="search-results" style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--purin-brown); border-radius: 8px; margin-top: 4px; padding: 0; list-style: none; max-height: 200px; overflow-y: auto; z-index: 1001; box-shadow: 0 4px 15px rgba(92,58,33,0.15);"></ul>
            </div>

            <div id="preview-box" style="display: none; margin-top: 10px; padding: 12px; background: white; border: 2px solid var(--purin-brown); border-radius: 8px; text-align: center;">
                <div style="font-size: 13px; font-weight: 800; color: var(--purin-brown); margin-bottom: 10px;">
                    📍 지도에서 위치를 확인했어요!<br><span id="preview-name" style="color: #ff6b6b;"></span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button onclick="confirmAddPlace()" style="flex: 1; padding: 8px; background: var(--purin-yellow); border: 2px solid var(--purin-brown); border-radius: 8px; font-weight: 800; color: var(--purin-brown); cursor: pointer; box-shadow: 0 2px 0 var(--purin-brown);">여기로 추가할래! 🐾</button>
                    <button onclick="cancelPreview()" style="padding: 8px 12px; background: #eee; border: 2px solid #ccc; border-radius: 8px; font-weight: 800; color: #666; cursor: pointer;">취소</button>
                </div>
            </div>

            <div style="text-align: right; margin-top: 8px; line-height: 1.8;">
                <span onclick="document.getElementById('link-input-box').style.display = 'block'; document.getElementById('manual-input-box').style.display = 'none';" style="font-size: 11px; color: #6482ff; font-weight: 700; cursor: pointer; text-decoration: underline; display: block;">
                    🔗 검색에 안 나오나요? 링크만 담아둘래요 ➔
                </span>
                <span onclick="document.getElementById('manual-input-box').style.display = 'block'; document.getElementById('link-input-box').style.display = 'none';" style="font-size: 11px; color: #ff6b6b; font-weight: 700; cursor: pointer; text-decoration: underline; display: block;">
                    📌 무조건 지도에 핀을 꽂을래요 (좌표 복붙) ➔
                </span>
            </div>

            <div id="link-input-box" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--purin-brown);">
                <div style="font-size: 12px; font-weight: 800; color: var(--purin-brown); margin-bottom: 8px;">🔗 구글맵 링크만 리스트에 담기</div>
                <input type="text" id="new-name-link" placeholder="장소 이름 (예: 모토무라 규카츠)" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 2px solid var(--purin-brown); border-radius: 8px; font-family: 'Pretendard';">
                <input type="text" id="new-link-url" placeholder="구글맵 '공유' 짧은 링크 붙여넣기" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 2px solid var(--purin-brown); border-radius: 8px; font-family: 'Pretendard';">
                <button onclick="addNewPlaceByLink()" style="width: 100%; padding: 8px; background: #FFF; border: 2px solid #6482ff; border-radius: 8px; font-weight: 800; color: #6482ff; cursor: pointer;">링크만 찜하기! (지도 표시X)</button>
            </div>

            <div id="manual-input-box" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--purin-brown);">
                <div style="font-size: 12px; font-weight: 800; color: var(--purin-brown); margin-bottom: 8px;">📌 구글맵 좌표로 정확하게 핀 꽂기</div>
                <input type="text" id="new-name-manual" placeholder="장소 이름 (직접 작성)" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 2px solid var(--purin-brown); border-radius: 8px; font-family: 'Pretendard';">
                <input type="text" id="new-coords-manual" placeholder="위도, 경도 복붙! (예: 34.665, 135.432)" style="width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 2px solid var(--purin-brown); border-radius: 8px; font-family: 'Pretendard';">
                <button onclick="addNewPlaceManual()" style="width: 100%; padding: 8px; background: var(--purin-yellow); border: 2px solid var(--purin-brown); border-radius: 8px; font-weight: 800; color: var(--purin-brown); cursor: pointer; box-shadow: 0 2px 0 var(--purin-brown);">좌표로 확실히 찜하기! 🐾</button>
                <div style="font-size: 11px; color: var(--text-sub); margin-top: 8px; line-height: 1.4;">
                    * 구글맵에서 장소를 <b>꾹 누르면</b> 뜨는 좌표를 쉼표(,) 포함해서 한 번에 붙여넣으세요!
                </div>
            </div>
        </div>
        <ul class="places-list" id="places-list">
        </ul>
        </div>
        
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

                    { name: "나니와바시 역", desc: "이동 - 유럽풍 광장", lat: 34.6930, lng: 135.5057 },
                    { name: "피피네라 키친", desc: "고앵이 카페 - 선택사항 (오후 5시까지)", lat: 34.7070, lng: 135.5060 },
                    { name: "오사카 역", desc: "이동", lat: 34.7024, lng: 135.4959 },
                    { name: "Kobe Station", desc: "오후 6시반 ~ 7시", lat: 34.6797, lng: 135.1783 },
                    { name: "Kobe Gas-Light St.", desc: "가스등 거리", lat: 34.6800, lng: 135.1810 },
                    { name: "도토리 공화국 고베모자이크점", desc: "지브리 샵 !!", lat: 34.6826, lng: 135.1867 },
                    { name: "메리켄 파크", desc: "오후 7시반 불꽃놀이", lat: 34.6826, lng: 135.1880 },
                    { name: "MERBABU STAY OSAKA", desc: "숙소 복귀", lat: 34.6850, lng: 135.5080 }
                ]
            },
            {
                dayNum: 4, title: "출국", color: "var(--day4-color)", textColor: "#ffffff",
                places: [
                    { name: "MERBABU STAY OSAKA", desc: "체크아웃", lat: 34.6850, lng: 135.5080 },
                    { name: "린쿠우 마부루 비치", desc: "해변", lat: 34.4072, lng: 135.2974 },
                    { name: "간사이 국제공항", desc: "오전 11시 비행기", lat: 34.4320, lng: 135.2304 }
                ]
            },
            {
                dayNum: "🌟", title: "가고 싶은 곳", color: "var(--extra-color)", textColor: "var(--purin-brown)",
                places: [
                    { name: "LIFE Sakaisuji Hommachi Store", desc: "대형 마트", lat: 34.6654, lng: 135.4323 },
                ]
            }

        ];
        
        const savedPlaces = JSON.parse(localStorage.getItem('myPurinPlaces')) || [];
        if (savedPlaces.length > 0) {
            tripData[4].places = [...tripData[4].places, ...savedPlaces];
        }

        let searchTimeout = null;
        let tempPreviewMarker = null;
        let pendingPlace = null;

        document.getElementById('place-search').addEventListener('input', function(e) {
            const query = e.target.value.trim();
            const resultsContainer = document.getElementById('search-results');

            if (query.length < 2) {
                resultsContainer.style.display = 'none';
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&accept-language=ko&countrycodes=jp&limit=5`)
                    .then(res => res.json())
                    .then(data => {
                        resultsContainer.innerHTML = '';
                        if (data.length === 0) {
                            resultsContainer.innerHTML = '<li style="padding: 10px; font-size: 13px; color: #999;">검색 결과가 없습니다 🥲</li>';
                            resultsContainer.style.display = 'block';
                            return;
                        }

                        data.forEach(item => {
                            const li = document.createElement('li');
                            li.className = 'search-result-item';
                            const shortName = item.name || item.display_name.split(',')[0];
                            li.innerHTML = `<b style="color:var(--purin-brown);">${shortName}</b><br><span style="font-size:11px; color:#888;">${item.display_name}</span>`;
                            
                            li.onclick = () => {
                                resultsContainer.style.display = 'none';
                                document.getElementById('place-search').value = shortName;
                                
                                pendingPlace = { name: shortName, lat: parseFloat(item.lat), lng: parseFloat(item.lon) };

                                document.getElementById('preview-box').style.display = 'block';
                                document.getElementById('preview-name').innerText = shortName;

                                const latLng = [pendingPlace.lat, pendingPlace.lng];
                                map.flyTo(latLng, 16, { animate: true, duration: 1.2 });
                                
                                if (tempPreviewMarker) map.removeLayer(tempPreviewMarker);
                                const previewIcon = L.divIcon({
                                    className: 'custom-div-icon',
                                    html: `<div style="background-color: white; width: 28px; height: 28px; border-radius: 50%; color: #ff6b6b; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; border: 2px dashed #ff6b6b;">?</div>`,
                                    iconSize: [30, 30],
                                    iconAnchor: [15, 15]
                                });
                                tempPreviewMarker = L.marker(latLng, { icon: previewIcon }).addTo(map)
                                    .bindPopup(`<b style="color:#ff6b6b;">여기를 추가할까요?</b>`).openPopup();
                            };
                            resultsContainer.appendChild(li);
                        });
                        resultsContainer.style.display = 'block';
                    });
            }, 500);
        });

        document.addEventListener('click', function(e) {
            if (!e.target.closest('#place-search') && !e.target.closest('#search-results')) {
                document.getElementById('search-results').style.display = 'none';
            }
        });

        function confirmAddPlace() {
            if (!pendingPlace) return;
            addNewPlaceFromSearch(pendingPlace.name, pendingPlace.lat, pendingPlace.lng);
            cancelPreview();
        }

        function cancelPreview() {
            pendingPlace = null;
            document.getElementById('preview-box').style.display = 'none';
            document.getElementById('place-search').value = '';
            if (tempPreviewMarker) {
                map.removeLayer(tempPreviewMarker);
                tempPreviewMarker = null;
            }
        }

        function addNewPlaceFromSearch(name, lat, lng, link = null) {
            const newPlace = {
                name: name,
                desc: link ? "링크로 찜한 곳🔗" : "내가 검색해서 찜한 곳 💛",
                lat: lat,
                lng: lng,
                customLink: link
            };
            tripData[4].places.push(newPlace);
            const currentSaved = JSON.parse(localStorage.getItem('myPurinPlaces')) || [];
            currentSaved.push(newPlace);
            localStorage.setItem('myPurinPlaces', JSON.stringify(currentSaved));
            renderMap(4);
        }

        function addNewPlaceByLink() {
            const nameInput = document.getElementById('new-name-link').value.trim();
            const linkInput = document.getElementById('new-link-url').value.trim();
            if (!nameInput || !linkInput) { alert('이름과 링크를 입력해주세요! 🍮'); return; }
            
            let lat = null, lng = null;
            const match = linkInput.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) { lat = parseFloat(match[1]); lng = parseFloat(match[2]); }
            
            addNewPlaceFromSearch(nameInput, lat, lng, linkInput);
            
            document.getElementById('new-name-link').value = '';
            document.getElementById('new-link-url').value = '';
            document.getElementById('link-input-box').style.display = 'none';
        }

        function addNewPlaceManual() {
            const nameInput = document.getElementById('new-name-manual').value.trim();
            const coordsInput = document.getElementById('new-coords-manual').value.trim();

            if (!nameInput || !coordsInput) {
                alert('장소 이름과 좌표를 모두 확인해 주세요! 🍮');
                return;
            }

            const coordsArray = coordsInput.split(',');
            if (coordsArray.length < 2) {
                alert('좌표 형식이 이상해요! 쉼표(,)가 포함된 구글맵 좌표를 그대로 넣어주세요. 🐾');
                return;
            }

            const latInput = parseFloat(coordsArray[0].trim());
            const lngInput = parseFloat(coordsArray[1].trim());

            if (isNaN(latInput) || isNaN(lngInput)) {
                alert('좌표에 문자가 섞여 있어요! 숫자만 잘 복사됐는지 확인해 주세요 🍮');
                return;
            }

            addNewPlaceFromSearch(nameInput, latInput, lngInput, null);

            document.getElementById('new-name-manual').value = '';
            document.getElementById('new-coords-manual').value = '';
            document.getElementById('manual-input-box').style.display = 'none';
        }

        const map = L.map('map', { zoomControl: false }).setView([34.6937, 135.5023], 10);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps', maxZoom: 20
        }).addTo(map);

        let currentMarkers = [];
        let currentPolylines = [];

        function renderMap(filterIndex) {
            cancelPreview();

            const addForm = document.getElementById('add-place-form');
            if (addForm) addForm.style.display = (filterIndex === 4) ? 'block' : 'none';
            
            currentMarkers.forEach(m => map.removeLayer(m));
            currentPolylines.forEach(p => map.removeLayer(p));
            currentMarkers = [];
            currentPolylines = [];

            const placesList = document.getElementById('places-list');
            placesList.innerHTML = '';

            let allCoords = [];
            let totalPlacesCount = 0;

            const daysToRender = filterIndex === 'all' ? tripData : [tripData[filterIndex]];

            daysToRender.forEach((data) => {
                const dayCoords = [];

                data.places.forEach((place, index) => {
                    totalPlacesCount++;
                    const hasCoords = (place.lat !== null && place.lat !== undefined && !isNaN(place.lat));
                    let marker = null;
                    const latLng = hasCoords ? [place.lat, place.lng] : null;

                    if (hasCoords) {
                        dayCoords.push(latLng);
                        allCoords.push(latLng);

                        const customIcon = L.divIcon({
                            className: 'custom-div-icon',
                            html: `<div style="background-color: ${data.color}; width: 24px; height: 24px; border-radius: 50%; color: ${data.textColor}; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; border: 2px solid var(--purin-brown); box-shadow: 0 3px 0 var(--purin-brown);">${index + 1}</div>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15]
                        });

                        marker = L.marker(latLng, { icon: customIcon }).addTo(map)
                            .bindPopup(`<b style="color:var(--purin-brown); font-size:15px;">${place.name}</b><br><span style="color:var(--text-sub);">DAY ${data.dayNum} - ${place.desc}</span>`);
                        currentMarkers.push(marker);
                    }

                    const gmapUrl = place.customLink ? place.customLink : `https://www.google.com/maps/search/?api=1&query=$${encodeURIComponent(place.name)}`;

                    const li = document.createElement('li');
                    li.className = 'place-item';
                    
                    li.innerHTML = `
                        <div class="marker-icon" style="background-color: ${data.color}; color: ${data.textColor};">${hasCoords ? index + 1 : '🔗'}</div>
                        <div class="place-info">
                            <div class="place-name">${place.name}</div>
                            <div class="place-desc">DAY ${data.dayNum} · ${place.desc}</div>
                        </div>
                        <a href="${gmapUrl}" target="_blank" class="gmap-link" onclick="event.stopPropagation();">지도 보기 ➔</a>
                    `;

                    li.addEventListener('click', () => {
                        if (hasCoords && marker) {
                            map.flyTo(latLng, 16, { animate: true, duration: 1.2 });
                            setTimeout(() => marker.openPopup(), 1200);
                        } else {
                            window.open(gmapUrl, '_blank');
                        }
                    });

                    placesList.appendChild(li);
                });

                if (dayCoords.length > 0) {
                    const polyline = L.polyline(dayCoords, {
                        color: data.color, weight: 4, opacity: 0.9, dashArray: '8, 8'
                    }).addTo(map);
                    currentPolylines.push(polyline);
                }
            });

            document.getElementById('place-count').innerText = `총 ${totalPlacesCount}곳`;
            if (allCoords.length > 0) {
                map.fitBounds(L.latLngBounds(allCoords), { padding: [40, 40], animate: true, duration: 1 });
            }
        }

        function filterDay(index) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

            if (index === 'all') {
                document.getElementById('btn-all').classList.add('active');
            } else if (index === 4) {
                document.getElementById('btn-extra').classList.add('active');
            } else {
                document.getElementById(`btn-day${index + 1}`).classList.add('active');
            }

            renderMap(index);
        }

        function createPetal() {
            const container = document.getElementById('sakura-container');
            const petal = document.createElement('div');
            petal.classList.add('petal');

            petal.innerText = '🌸';

            const size = Math.random() * 12 + 10;
            const left = Math.random() * 100;
            const fallDuration = Math.random() * 6 + 8;
            const swayDuration = Math.random() * 3 + 3;
            const delay = Math.random() * -15;

            petal.style.fontSize = `${size}px`;
            petal.style.left = `${left}vw`;
            petal.style.animation = `
                fall ${fallDuration}s linear ${delay}s infinite,
                sway ${swayDuration}s ease-in-out ${delay}s infinite alternate
            `;

            container.appendChild(petal);
        }

        for (let i = 0; i < 45; i++) {
            createPetal();
        }

    </script>
</body>

</html>
